name: Update RSS Articles

on:
  schedule:
    - cron: '0 3 * * *'   # 10:00 WIB (UTC+7 → 03:00 UTC)
    - cron: '0 8 * * *'   # 15:00 WIB (UTC+7 → 08:00 UTC)
  workflow_dispatch:      # bisa dijalankan manual

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install rss-parser

      - name: Run update script
        run: node update-rss.js

      - name: Commit & Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add rss-articles.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update RSS articles $(date)" && git push)
